services:
  db:
    image: postgres:16-alpine
    container_name: zoho_crm_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-crm_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jayking46}
    ports:
      - "${DB_PORT:-35432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-crm_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zoho_crm_backend
    restart: always
    ports:
      - "${BACKEND_PORT:-6000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-crm_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-jayking46}
      JWT_SECRET: ${JWT_SECRET:-super_secret_crm_jwt_key_2026}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-86400}
      BCRYPT_SALT_ROUNDS: 10
      SWAGGER_ENABLED: "true"
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:6000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3080}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Falls back to the root .env VITE_API_URL or defaults to localhost:6000
        VITE_API_URL: ${VITE_API_URL:-http://localhost:6000/api/v1}
    container_name: zoho_crm_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3080}:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
